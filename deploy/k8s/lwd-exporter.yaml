apiVersion: apps/v1
kind: Deployment
metadata:
  name: lwd-exporter
  labels:
    app.kubernetes.io/name: lwd-exporter
    app.kubernetes.io/part-of: shielded-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lwd-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lwd-exporter
    spec:
      containers:
        - name: lwd-exporter
          image: ghcr.io/fidelcoder/shielded-stack/lwd-exporter:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SHIELDED_STACK_ADDR
              value: ":9467"
            - name: SHIELDED_STACK_ENDPOINTS
              valueFrom:
                configMapKeyRef:
                  name: lwd-exporter
                  key: endpoints
          ports:
            - name: http
              containerPort: 9467
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: lwd-exporter
  labels:
    app.kubernetes.io/name: lwd-exporter
    app.kubernetes.io/part-of: shielded-stack
spec:
  selector:
    app.kubernetes.io/name: lwd-exporter
  ports:
    - name: http
      port: 9467
      targetPort: http

