apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-lwd-exporter
  labels:
    app.kubernetes.io/name: lwd-exporter
    app.kubernetes.io/part-of: shielded-stack
spec:
  selector:
    app.kubernetes.io/name: lwd-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http

